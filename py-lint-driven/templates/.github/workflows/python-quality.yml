name: Python Quality

on:
  pull_request:
    branches: [main]

jobs:
  review:
    name: Inline Review Comments
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-review-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-review-

      - name: Install tools
        run: pip install ruff complexipy xenon

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1

      - name: Get changed Python files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD -- '*.py' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Ruff (inline review comments)
        if: steps.changed.outputs.files != ''
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check --output-format=rdjson ${{ steps.changed.outputs.files }} | \
            reviewdog -f=rdjson -reporter=github-pr-review || true

      - name: complexipy (inline annotations)
        if: steps.changed.outputs.files != ''
        run: |
          complexipy ${{ steps.changed.outputs.files }} > /tmp/cx.txt || true
          python3 - << 'EOF'
current_file = None
with open("/tmp/cx.txt") as f:
    for line in f:
        line = line.rstrip()
        stripped = line.strip()
        if stripped.endswith(".py") and not line.startswith(" "):
            current_file = stripped.removeprefix("./")
        elif stripped.endswith("FAILED") and current_file:
            parts = stripped.split()
            func_name, score = parts[0], parts[1]
            print(f"::warning file={current_file}::Function '{func_name}' has cognitive complexity {score}")
EOF

  checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-checks-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-checks-

      - name: Install tools
        run: pip install ruff complexipy xenon pytest pytest-cov

      - uses: arduino/setup-task@v2

      - name: Get changed Python files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD -- '*.py' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: ruff
        id: ruff
        if: steps.changed.outputs.files != ''
        continue-on-error: true
        run: task python:ruff FILES="${{ steps.changed.outputs.files }}"

      - name: complexipy
        id: complexipy
        if: steps.changed.outputs.files != ''
        continue-on-error: true
        run: task python:complexity FILES="${{ steps.changed.outputs.files }}"

      - name: xenon
        id: xenon
        continue-on-error: true
        run: |
          XENON_MAX_ABSOLUTE=${{ vars.XENON_MAX_ABSOLUTE || 'B' }} \
          XENON_MAX_MODULES=${{ vars.XENON_MAX_MODULES || 'A' }} \
          XENON_MAX_AVERAGE=${{ vars.XENON_MAX_AVERAGE || 'A' }} \
          task python:cyclomatic

      - name: pytest
        id: pytest
        continue-on-error: true
        run: task python:test

      - name: results
        if: always()
        run: |
          echo "ruff:       ${{ steps.ruff.outcome }}"
          echo "complexipy: ${{ steps.complexipy.outcome }}"
          echo "xenon:      ${{ steps.xenon.outcome }}"
          echo "pytest:     ${{ steps.pytest.outcome }}"
          if [[ "${{ steps.ruff.outcome }}"       != "success" && "${{ steps.ruff.outcome }}"       != "skipped" ]] || \
             [[ "${{ steps.complexipy.outcome }}"  != "success" && "${{ steps.complexipy.outcome }}"  != "skipped" ]] || \
             [[ "${{ steps.xenon.outcome }}"      != "success" ]] || \
             [[ "${{ steps.pytest.outcome }}"     != "success" ]]; then
            echo "One or more checks failed."
            exit 1
          fi
          echo "All checks passed."
