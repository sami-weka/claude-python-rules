name: Python Quality

on:
  pull_request:
    branches: [main]

jobs:
  review:
    name: Inline Review Comments
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-review-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-review-

      - name: Install tools
        run: pip install ruff complexipy xenon

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1

      - name: Get changed Python files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD -- '*.py' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Ruff (inline review comments)
        if: steps.changed.outputs.files != ''
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check --output-format=rdjson ${{ steps.changed.outputs.files }} | \
            reviewdog -f=rdjson -reporter=github-pr-review || true

      - name: complexipy (inline annotations)
        if: steps.changed.outputs.files != ''
        run: |
          complexipy ${{ steps.changed.outputs.files }} > /tmp/cx.txt || true
          python3 - << 'EOF'
          import re, subprocess
          threshold = 15
          try:
              out = subprocess.check_output(
                  ["python3", "-c",
                   "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); "
                   "print(d.get('tool',{}).get('complexipy',{}).get('max-complexity-allowed',15))"],
                  text=True).strip()
              threshold = int(out)
          except Exception:
              pass
          current_file = None
          with open("/tmp/cx.txt") as f:
              for line in f:
                  line = line.rstrip()
                  stripped = line.strip()
                  if stripped.endswith(".py") and not line.startswith("    "):
                      current_file = stripped
                  elif stripped.endswith("FAILED") and current_file:
                      parts = stripped.split()
                      func_name, score = parts[0], parts[1]
                      print(f"::warning file={current_file}::Function '{func_name}' has cognitive complexity {score} (threshold: {threshold})")
          EOF

  checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-checks-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-checks-

      - name: Install tools
        run: pip install ruff complexipy xenon pytest pytest-cov

      - uses: arduino/setup-task@v2

      - name: Run CI quality checks
        run: task python:ci
