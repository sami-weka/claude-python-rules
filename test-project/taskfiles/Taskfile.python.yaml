# taskfiles/Taskfile.python.yaml
# Generated by py-lint-driven plugin. Safe to modify — plugin will not overwrite.
# Tasks have no 'python:' prefix — the includes directive in Taskfile.yaml adds it.
# Invoke as: task python:lint, task python:test, etc.
# Within this file, reference sibling tasks by short name (e.g. task: lint, task: ruff).
version: '3'

vars:
  XENON_MAX_ABSOLUTE: "B"
  XENON_MAX_MODULES: "A"
  XENON_MAX_AVERAGE: "A"
  MIN_COVERAGE: "80"

tasks:

  # --- Leaf tasks: direct tool invocations ---

  ruff:
    desc: "Run ruff check (config from pyproject.toml)"
    cmds:
      - ruff check {{.FILES | default "."}}

  ruff:fix:
    desc: "Run ruff check with auto-fix"
    cmds:
      - ruff check --fix {{.FILES | default "."}}

  complexity:
    desc: "Run complexipy — threshold read from pyproject.toml [tool.complexipy]"
    cmds:
      - complexipy {{.FILES | default "."}}

  cyclomatic:
    desc: "Run xenon — exits non-zero if cyclomatic complexity exceeds thresholds (always runs on .)"
    cmds:
      - xenon -b {{.XENON_MAX_ABSOLUTE}} -m {{.XENON_MAX_MODULES}} -a {{.XENON_MAX_AVERAGE}} .

  fmt:
    desc: "Run ruff format"
    cmds:
      - ruff format {{.FILES | default "."}}

  fmt:check:
    desc: "Run ruff format check (no changes applied)"
    cmds:
      - ruff format --check {{.FILES | default "."}}

  test:
    desc: "Run pytest on the tests/ directory"
    cmds:
      - pytest tests/ -v

  test:file:
    desc: "Run pytest on a specific test file. Pass FILE=path/to/test.py"
    cmds:
      - pytest {{.FILE}} -v

  test:coverage:
    desc: "Run pytest with coverage report (shows missing lines)"
    cmds:
      - pytest tests/ -v --cov=src --cov-report=term-missing

  test:coverage:check:
    desc: "Run pytest with coverage — fails if below MIN_COVERAGE percent"
    cmds:
      - pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under={{.MIN_COVERAGE}}

  test:watch:
    desc: "Run pytest in watch mode (local use only, requires pytest-watch)"
    cmds:
      - ptw tests/

  # --- Composite tasks ---

  lint:fast:
    desc: "Ruff only — fast, used by hooks when hooks_run_complexity is false"
    cmds:
      - task: ruff
      - echo "--> Ruff check passed"

  lint:
    desc: "Full lint: ruff + complexity + cyclomatic"
    cmds:
      - task: ruff
      - task: complexity
      - task: cyclomatic
      - echo "--> All Python linters passed"

  lint:fix:
    desc: "Ruff auto-fix + complexity + cyclomatic check (only ruff is auto-fixable)"
    cmds:
      - task: ruff:fix
      - task: complexity
      - task: cyclomatic
      - echo "--> Ruff auto-fix applied, linters checked"

  git:changed-py:
    desc: "Print space-separated git-changed Python files (staged, unstaged, new untracked). Canonical definition consumed by tdd:fix:git and lint:fix:git."
    silent: true
    cmds:
      - "{ git diff --name-only --diff-filter=ACMRT HEAD -- '*.py' 2>/dev/null; git ls-files --others --exclude-standard -- '*.py' 2>/dev/null; } | tr '\n' ' '"

  lint:fix:git:
    desc: "Lint fix cycle scoped to git-changed Python files. See git:changed-py for file selection logic."
    vars:
      CHANGED:
        sh: "task python:git:changed-py"
    status:
      - '[ -z "{{.CHANGED}}" ]'
    cmds:
      - task: ruff:fix
        vars:
          FILES: "{{.CHANGED}}"
      - task: complexity
        vars:
          FILES: "{{.CHANGED}}"
      - task: cyclomatic
      - task: fmt
        vars:
          FILES: "{{.CHANGED}}"
      - 'echo "--> Lint fix cycle complete (changed files: {{.CHANGED}})"'

  check:
    desc: "Full check: lint + format check (read-only)"
    cmds:
      - task: lint
      - task: fmt:check
      - echo "--> All Python checks passed"

  fix:
    desc: "Auto-fix and format"
    cmds:
      - task: lint:fix
      - task: fmt
      - echo "--> Auto-fix and format complete"

  tdd:fast:
    desc: "Tests + ruff only — fast hook mode"
    cmds:
      - task: test
      - task: lint:fast
      - echo "--> Tests passed and ruff clean"

  tdd:
    desc: "Full TDD cycle: tests + ruff + complexity + cyclomatic"
    cmds:
      - task: test
      - task: lint
      - echo "--> All tests passed and linting clean"

  tdd:fix:
    desc: "Full TDD fix cycle: tests + ruff:fix + complexity + cyclomatic + fmt"
    cmds:
      - task: test
      - task: lint:fix
      - task: fmt
      - echo "--> TDD cycle complete with fixes applied"

  tdd:fix:git:
    desc: "TDD fix cycle scoped to git-changed Python files. See git:changed-py for file selection logic."
    vars:
      CHANGED:
        sh: "task python:git:changed-py"
    status:
      - '[ -z "{{.CHANGED}}" ]'
    cmds:
      - task: test
      - task: ruff:fix
        vars:
          FILES: "{{.CHANGED}}"
      - task: complexity
        vars:
          FILES: "{{.CHANGED}}"
      - task: cyclomatic
      - task: fmt
        vars:
          FILES: "{{.CHANGED}}"
      - 'echo "--> TDD fix cycle complete (changed files: {{.CHANGED}})"'

  ci:
    desc: "CI: run checks on changed Python files only. Skips cleanly if none changed."
    vars:
      CHANGED_PY_FILES:
        sh: "git fetch origin ${GITHUB_BASE_REF:-main} --quiet && git diff --name-only --diff-filter=ACMRT origin/${GITHUB_BASE_REF:-main}...HEAD -- '*.py' | tr '\n' ' '"
    status:
      - '[ -z "{{.CHANGED_PY_FILES}}" ]'
    cmds:
      - task: ruff
        vars: {FILES: "{{.CHANGED_PY_FILES}}"}
      - task: complexity
        vars: {FILES: "{{.CHANGED_PY_FILES}}"}
      - task: cyclomatic
      - task: test
      - echo "--> CI checks passed"
