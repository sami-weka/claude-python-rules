# taskfiles/Taskfile.python.yaml
# Generated by py-lint-driven plugin. Safe to modify — plugin will not overwrite.
# Tasks have no 'python:' prefix — the includes directive in Taskfile.yaml adds it.
# Invoke as: task python:lint, task python:test, etc.
# Within this file, reference sibling tasks by short name (e.g. task: lint, task: ruff).
version: '3'

vars:
  MAX_COGNITIVE_COMPLEXITY: "15"

tasks:

  # --- Leaf tasks: direct tool invocations ---

  ruff:
    desc: "Run ruff check (config from pyproject.toml)"
    cmds:
      - ruff check {{.FILES | default "."}}

  ruff:fix:
    desc: "Run ruff check with auto-fix"
    cmds:
      - ruff check --fix {{.FILES | default "."}}

  complexity:
    desc: "Run complexipy — exits non-zero if cognitive complexity exceeds MAX_COGNITIVE_COMPLEXITY"
    cmds:
      - complexipy -mx {{.MAX_COGNITIVE_COMPLEXITY}} {{.FILES | default "."}}

  fmt:
    desc: "Run ruff format"
    cmds:
      - ruff format {{.FILES | default "."}}

  fmt:check:
    desc: "Run ruff format check (no changes applied)"
    cmds:
      - ruff format --check {{.FILES | default "."}}

  test:
    desc: "Run pytest on the tests/ directory"
    cmds:
      - pytest tests/ -v

  test:file:
    desc: "Run pytest on a specific test file. Pass FILE=path/to/test.py"
    cmds:
      - pytest {{.FILE}} -v

  test:watch:
    desc: "Run pytest in watch mode (local use only, requires pytest-watch)"
    cmds:
      - ptw tests/

  # --- Composite tasks ---

  lint:fast:
    desc: "Ruff only — fast, used by hooks when hooks_run_complexity is false"
    cmds:
      - task: ruff
      - echo "--> Ruff check passed"

  lint:
    desc: "Full lint: ruff + complexity"
    cmds:
      - task: ruff
      - task: complexity
      - echo "--> All Python linters passed"

  lint:fix:
    desc: "Ruff auto-fix + complexity check (only ruff is auto-fixable)"
    cmds:
      - task: ruff:fix
      - task: complexity
      - echo "--> Ruff auto-fix applied, linters checked"

  check:
    desc: "Full check: lint + format check (read-only)"
    cmds:
      - task: lint
      - task: fmt:check
      - echo "--> All Python checks passed"

  fix:
    desc: "Auto-fix and format"
    cmds:
      - task: lint:fix
      - task: fmt
      - echo "--> Auto-fix and format complete"

  tdd:fast:
    desc: "Tests + ruff only — fast hook mode"
    cmds:
      - task: test
      - task: lint:fast
      - echo "--> Tests passed and ruff clean"

  tdd:
    desc: "Full TDD cycle: tests + ruff + complexity"
    cmds:
      - task: test
      - task: lint
      - echo "--> All tests passed and linting clean"

  tdd:fix:
    desc: "Full TDD fix cycle: tests + ruff:fix + complexity + fmt"
    cmds:
      - task: test
      - task: lint:fix
      - task: fmt
      - echo "--> TDD cycle complete with fixes applied"

  ci:
    desc: "CI: run checks on changed Python files only. Skips cleanly if none changed."
    vars:
      CHANGED_PY_FILES:
        sh: "git fetch origin ${GITHUB_BASE_REF:-main} --quiet && git diff --name-only --diff-filter=ACMRT origin/${GITHUB_BASE_REF:-main}...HEAD -- '*.py' | tr '\n' ' '"
    status:
      - '[ -z "{{.CHANGED_PY_FILES}}" ]'
    cmds:
      - task: ruff
        vars: {FILES: "{{.CHANGED_PY_FILES}}"}
      - task: complexity
        vars: {FILES: "{{.CHANGED_PY_FILES}}"}
      - task: test
      - echo "--> CI checks passed"
